<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRUMIQ — Under Construction</title>
<meta name="description" content="DRUMIQ — Site in constructie. Revenim in curand.">
<meta property="og:title" content="DRUMIQ — Under Construction">
<meta property="og:url" content="https://drumiq.ro/">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e0b;
  --text:#f5efe6;
  --textMuted:#8a7d70;
  --textDim:#5a5040;
  --accent:#c97d3a;
  --accentLight:#e0a96a;
  --go:#00FF88;
  --think:#FFB800;
  --stop:#FF3366;
  --border:#2a2420;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 24px;
  overflow:hidden;
}

.bg-glow{
  position:fixed;
  width:400px;height:400px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.15;
  pointer-events:none;
  z-index:0;
}
.glow-1{top:-100px;left:-100px;background:var(--accent)}
.glow-2{bottom:-100px;right:-100px;background:var(--go)}

.content{position:relative;z-index:1}

.logo{
  font-family:'Anton',sans-serif;
  font-size:clamp(64px,14vw,100px);
  letter-spacing:3px;
  margin-bottom:16px;
  line-height:1;
}
.logo .accent{color:var(--accent)}

.construction-badge{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 24px;
  border-radius:24px;
  font-size:14px;
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:2px;
  text-transform:uppercase;
  background:rgba(255,184,0,0.12);
  color:var(--think);
  border:1px solid rgba(255,184,0,0.3);
  margin-bottom:32px;
  animation:pulse 2s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 rgba(255,184,0,0)}
  50%{opacity:0.85;box-shadow:0 0 20px rgba(255,184,0,0.15)}
}

.gear{
  display:inline-block;
  animation:spin 4s linear infinite;
}
@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.message{
  font-size:clamp(16px,3vw,20px);
  color:var(--textMuted);
  max-width:460px;
  line-height:1.8;
  margin-bottom:40px;
}

.contact-box{
  background:rgba(20,26,21,0.8);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px 32px;
  display:inline-block;
}
.contact-label{
  font-size:11px;
  color:var(--textDim);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.contact-email{
  color:var(--accent);
  text-decoration:none;
  font-size:16px;
  font-weight:700;
}
.contact-email:hover{color:var(--accentLight)}

.footer{
  position:fixed;
  bottom:20px;
  font-size:11px;
  color:var(--textDim);
  font-family:'JetBrains Mono',monospace;
}
</style>
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="content">
  <div class="logo">DRUM<span class="accent">IQ</span></div>

  <div class="construction-badge">
    <span class="gear">&#9881;</span> Under Construction
  </div>

  <p class="message">
    Lucram la ceva nou. Revenim in curand cu o experienta mai buna.
  </p>

  <div class="contact-box">
    <div class="contact-label">Contact</div>
    <a href="mailto:contact@drumiq.ro" class="contact-email">contact@drumiq.ro</a>
  </div>
</div>

<div class="footer">&copy; 2026 DRUMIQ by GO PAMPA S.R.L.</div>

</body>
</html>
