<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRUMIQ — Coming Soon</title>
<meta name="description" content="DRUMIQ — Performance Intelligence pentru soferi. Coming soon.">
<meta property="og:title" content="DRUMIQ — Coming Soon">
<meta property="og:description" content="Singura aplicatie care iti spune instant daca o cursa merita. In curand.">
<meta property="og:image" content="https://drumiq.ro/assets/img/og-image.png">
<meta property="og:url" content="https://drumiq.ro/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://drumiq.ro/">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Inter+Tight:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0a0e0b;
  color:#f5efe6;
  font-family:'Manrope',sans-serif;
  text-align:center;
  padding:24px;
  overflow:hidden;
}
.logo{
  font-family:'Anton',sans-serif;
  font-size:clamp(48px,10vw,72px);
  letter-spacing:2px;
  margin-bottom:8px;
}
.logo .accent{
  color:#c97d3a;
}
.tagline{
  font-family:'Fraunces',serif;
  font-style:italic;
  font-size:clamp(16px,3vw,22px);
  color:#c97d3a;
  margin-bottom:40px;
}
.status{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#6a5d50;
  margin-bottom:12px;
}
.bar-wrap{
  width:min(320px,80vw);
  height:4px;
  background:#1a1410;
  border-radius:2px;
  overflow:hidden;
  margin-bottom:48px;
}
.bar{
  width:65%;
  height:100%;
  background:linear-gradient(90deg,#c97d3a,#e0a96a);
  border-radius:2px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.5}
}
.notify{
  margin-bottom:16px;
  font-size:14px;
  color:#8a7d70;
}
.email-row{
  display:flex;
  gap:0;
  width:min(400px,85vw);
}
.email-row input{
  flex:1;
  padding:14px 16px;
  border:1px solid #2a2420;
  border-right:none;
  border-radius:8px 0 0 8px;
  background:#111;
  color:#f5efe6;
  font-family:'Manrope',sans-serif;
  font-size:14px;
  outline:none;
}
.email-row input::placeholder{color:#4a4440}
.email-row input:focus{border-color:#c97d3a}
.email-row button{
  padding:14px 24px;
  border:none;
  border-radius:0 8px 8px 0;
  background:#c97d3a;
  color:#0a0e0b;
  font-family:'Manrope',sans-serif;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  white-space:nowrap;
}
.email-row button:hover{background:#e0a96a}
.footer-line{
  position:fixed;
  bottom:24px;
  font-size:11px;
  color:#3a3430;
  font-family:'JetBrains Mono',monospace;
}
.msg{
  margin-top:12px;
  font-size:13px;
  color:#c97d3a;
  min-height:20px;
}
</style>
</head>
<body>

<div class="logo">DRUM<span class="accent">IQ</span></div>
<div class="tagline">Performance Intelligence pentru soferi.</div>

<div class="status">Under Construction</div>
<div class="bar-wrap"><div class="bar"></div></div>

<div class="notify">Fii primul care afla cand lansam.</div>
<form class="email-row" onsubmit="return subscribe(event)">
  <input type="email" id="emailInput" placeholder="adresa ta de email" required>
  <button type="submit">Anunta-ma</button>
</form>
<div class="msg" id="msg"></div>

<div class="footer-line">&copy; 2026 DRUMIQ by GO PAMPA S.R.L.</div>

<script>
function subscribe(e){
  e.preventDefault();
  var email=document.getElementById('emailInput').value;
  var msg=document.getElementById('msg');
  msg.textContent='Te-am notat! Te anuntam cand lansam.';
  document.getElementById('emailInput').value='';
  setTimeout(function(){msg.textContent='';},4000);
  return false;
}
</script>
</body>
</html>
