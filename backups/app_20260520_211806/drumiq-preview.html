<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRUMIQ — Preview Interactiv</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0A0E0B;
  --surface: #141A15;
  --surfaceAlt: #1A2218;
  --text: #E8FFE8;
  --textMuted: #7A8A7C;
  --textDim: #4A5A4C;
  --border: #1E2A1F;
  --accent: #00FF88;
  --accentDim: #00CC6A;
  --stop: #FF3366;
  --think: #FFB800;
  --go: #00FF88;
  --font: -apple-system, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}
body {
  background: #000;
  font-family: var(--font);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
.phone-frame {
  width: 390px;
  height: 844px;
  background: var(--bg);
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 60px rgba(0,255,136,0.15), 0 0 0 2px #222;
  display: flex;
  flex-direction: column;
}
.notch {
  width: 100%;
  height: 50px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.notch-pill {
  width: 80px;
  height: 26px;
  background: #000;
  border-radius: 20px;
}
.screen-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
.screen-area::-webkit-scrollbar { display: none; }

/* Bottom tabs */
.bottom-tabs {
  display: flex;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 8px 0 20px;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}
.tab-item:hover { opacity: 0.8; }
.tab-item .indicator {
  position: absolute;
  top: -8px;
  left: 25%;
  right: 25%;
  height: 2px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  display: none;
}
.tab-item.active .indicator { display: block; }
.tab-icon { font-size: 18px; opacity: 0.55; }
.tab-item.active .tab-icon { opacity: 1; }
.tab-label { font-size: 9px; font-weight: 700; letter-spacing: 1.2px; color: var(--textMuted); }
.tab-item.active .tab-label { color: var(--accent); }

/* Shared styles */
.screen { padding: 16px; padding-bottom: 20px; }
.page-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: var(--text); margin-top: 4px; }
.page-title .accent { color: var(--accent); }
.page-sub { font-size: 10px; font-family: var(--mono); letter-spacing: 1px; color: var(--textMuted); margin-top: 2px; margin-bottom: 12px; }
.section-lbl { font-size: 10px; letter-spacing: 2.5px; font-weight: 900; color: var(--textMuted); margin: 8px 0 10px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
}
.stat-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  width: calc(50% - 4px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  background: var(--surface);
}
.stat-lbl { font-size: 8px; letter-spacing: 2px; font-weight: 700; color: var(--textMuted); margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.stat-unit { font-size: 11px; font-weight: 500; color: var(--textMuted); }

.btn-primary {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid var(--accent);
  background: var(--surface);
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--accent); color: #000; }

.btn-accent {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #000;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-align: center;
  cursor: pointer;
}
.btn-accent:hover { opacity: 0.9; }

.btn-danger {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid var(--stop);
  background: transparent;
  color: var(--stop);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: center;
  cursor: pointer;
  margin-top: 16px;
}

.back-btn {
  padding: 8px 0;
  color: var(--accent);
  font-size: 17px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font);
}
.back-btn:hover { opacity: 0.7; }

/* Tabs row */
.tabs-row {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--textMuted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.tab-btn:hover:not(.active) { border-color: var(--accent); }

/* Ride cards */
.ride-card {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--go);
  margin-bottom: 6px;
  background: var(--surface);
}
.ride-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.ride-time { font-size: 10px; font-family: var(--mono); color: var(--textMuted); }
.ride-price { font-size: 14px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.ride-addr { font-size: 9px; font-family: var(--mono); color: var(--textMuted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ride-bottom { display: flex; justify-content: space-between; align-items: center; }
.ride-meta { font-size: 9px; font-family: var(--mono); color: var(--textMuted); }
.ride-verdict { font-size: 11px; font-weight: 700; }
.ride-status { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-right: 8px; }

/* Settings group */
.settings-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
}
.settings-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-row:hover { background: var(--surfaceAlt); }
.settings-row + .settings-row { border-top: 1px solid var(--border); }
.settings-label { font-size: 16px; font-weight: 500; color: var(--text); flex: 1; }
.settings-sublabel { font-size: 12px; color: var(--textDim); margin-top: 2px; }
.settings-chevron { font-size: 22px; color: var(--textDim); margin-left: auto; }
.settings-value { font-size: 16px; font-weight: 600; color: var(--accent); margin-left: auto; }
.settings-section-lbl { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--textDim); padding: 12px 20px 8px; }

/* Toggle switch */
.toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  width: 20px;
  height: 20px;
  border-radius: 10px;
  background: var(--surface);
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(20px); }

/* Overlay demo */
.bolt-mock {
  background: #f5f5f5;
  border-radius: 16px;
  min-height: 440px;
  position: relative;
  overflow: hidden;
  margin-bottom: 24px;
}
.bolt-refuza {
  position: absolute;
  top: 14px;
  right: 14px;
  background: #1A1A1A;
  padding: 8px 14px;
  border-radius: 16px;
  z-index: 5;
  color: white;
  font-size: 12px;
  font-weight: 600;
}
.overlay-wrap {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 10;
}
.bolt-card-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 14px;
  padding-bottom: 60px;
  border-top: 3px solid #00B85F;
}
.bolt-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.bolt-tag {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
}
.bolt-price { font-size: 18px; font-weight: 800; color: #111; }
.bolt-price-sub { font-size: 11px; color: #555; font-weight: 500; }
.bolt-info { font-size: 11px; color: #888; margin-top: 4px; margin-bottom: 6px; }
.bolt-accept {
  position: absolute;
  bottom: 12px;
  left: 14px;
  right: 14px;
  background: #00B85F;
  padding: 12px;
  border-radius: 22px;
  text-align: center;
  color: white;
  font-size: 13px;
  font-weight: 700;
}

/* Overlay card */
.ov-card {
  min-width: 200px;
  max-width: 220px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.ov-color-bar { height: 4px; width: 100%; }
.ov-body { padding: 10px; background: rgba(10,14,11,0.92); }
.ov-pro-body { padding: 14px; background: rgba(10,14,11,0.92); }
.ov-verdict-row { display: flex; align-items: center; margin-bottom: 6px; }
.ov-symbol {
  width: 30px;
  height: 30px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 900;
  color: #000;
}
.ov-symbol-pro {
  width: 38px;
  height: 38px;
  border-radius: 19px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  color: #000;
}
.ov-ppkm { font-size: 14px; font-weight: 700; font-family: var(--mono); margin-left: 8px; }
.ov-breakdown { display: none; }
.ov-daily { font-size: 10px; font-family: var(--mono); font-weight: 700; color: #FFB800; margin-top: 3px; }
.ov-divider { height: 1px; background: #1E2A1F; margin: 6px 0; }
.ov-stats-row { display: flex; margin: 3px 0; }
.ov-stat { flex: 1; }
.ov-stat-lbl { font-size: 8px; color: #5A6B5C; font-weight: 700; letter-spacing: 1.2px; }
.ov-stat-val { font-size: 11px; color: #E8FFE8; font-family: var(--mono); font-weight: 600; margin-top: 1px; }
.ov-pro-lbl { font-size: 9px; color: #7A8A7C; font-weight: 700; letter-spacing: 1.5px; }
.ov-pro-ppkm { font-size: 16px; font-weight: 700; font-family: var(--mono); }
.ov-src { font-size: 9px; font-family: var(--mono); }

/* Plan cards */
.plan-card {
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
  background: var(--surface);
  position: relative;
}
.plan-rec-badge {
  position: absolute;
  top: -10px;
  right: 14px;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 900;
  color: #000;
  letter-spacing: 2px;
}
.plan-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.plan-name { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.plan-price { font-size: 18px; font-weight: 800; font-family: var(--mono); color: var(--text); }
.plan-price-unit { font-size: 10px; font-weight: 500; color: var(--textMuted); }
.feature-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.feature-check { font-size: 14px; font-weight: 700; width: 14px; }
.feature-txt { font-size: 12px; }

/* Profile */
.avatar-card {
  padding: 24px;
  border-radius: 12px;
  border: 1px solid var(--accent);
  text-align: center;
  margin-bottom: 16px;
  background: var(--surface);
  box-shadow: 0 0 12px rgba(0,255,136,0.15);
}
.avatar-circle {
  width: 72px;
  height: 72px;
  border-radius: 36px;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  box-shadow: 0 0 12px rgba(0,255,136,0.3);
}
.avatar-letter { font-size: 32px; font-weight: 900; color: var(--accent); }
.avatar-name { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: var(--text); }
.avatar-sub { font-size: 9px; font-family: var(--mono); letter-spacing: 2px; color: var(--textMuted); margin-top: 4px; }
.plan-pill {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  border: 1px solid var(--accent);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--accent);
  margin-top: 10px;
}

/* Row with label + value */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}
.info-row + .info-row { border-top: 1px solid #1E2A1F; margin-top: 4px; padding-top: 8px; }
.info-lbl { font-size: 11px; color: var(--textMuted); }
.info-val { font-size: 12px; font-weight: 700; font-family: var(--mono); color: var(--text); }

/* Input mock */
.input-mock {
  background: var(--surfaceAlt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  width: 90px;
}

/* Warning card */
.warning-card {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid;
  margin-bottom: 12px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
}

/* Progress bar */
.progress-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--surfaceAlt);
  overflow: hidden;
  margin-bottom: 16px;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  box-shadow: 0 0 6px;
}

/* Goal bar */
.goal-bar-bg {
  height: 8px;
  border-radius: 4px;
  background: var(--surfaceAlt);
  overflow: hidden;
  margin-bottom: 6px;
}
.goal-bar-fill {
  height: 100%;
  border-radius: 4px;
  box-shadow: 0 0 6px;
}

/* Beta disclaimer */
.beta-disclaimer {
  background: var(--surfaceAlt);
  border: 1px solid var(--think);
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 12px;
  text-align: center;
}
.beta-disclaimer span {
  font-size: 10px;
  color: var(--think);
  font-weight: 700;
  letter-spacing: 1px;
}

/* Filter settings specifics */
.filter-info-card {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--accent);
  margin-bottom: 16px;
  background: var(--surface);
}
.filter-info-txt { font-size: 11px; line-height: 17px; color: var(--textMuted); }

.threshold-card {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
  background: var(--surface);
}
.threshold-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.threshold-title { font-size: 13px; font-weight: 700; color: var(--text); }
.threshold-hint { font-size: 9px; font-family: var(--mono); color: var(--textDim); margin-bottom: 8px; line-height: 13px; }
.threshold-input-row { display: flex; align-items: center; gap: 8px; }
.threshold-prefix { font-size: 10px; font-family: var(--mono); color: var(--textMuted); }
.threshold-unit { font-size: 10px; font-family: var(--mono); color: var(--textMuted); }

/* Onboarding */
.onboarding-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 32px;
  text-align: center;
}
.onboarding-title { font-size: 24px; font-weight: 800; color: var(--text); }
.onboarding-hint { font-size: 14px; color: var(--textMuted); margin-top: 12px; line-height: 21px; }
.dots-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
.dot { width: 8px; height: 8px; border-radius: 4px; background: var(--border); }
.dot.active { background: var(--accent); }

.bullet-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.bullet-circle {
  width: 36px; height: 36px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #000;
  flex-shrink: 0;
}
.bullet-text { font-size: 15px; font-weight: 600; color: var(--text); }

.perm-row {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 12px;
  cursor: pointer;
}
.perm-row:hover { border-color: var(--accent); }
.perm-check {
  width: 28px; height: 28px; border-radius: 14px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-right: 14px;
  flex-shrink: 0;
}
.perm-check.checked { background: var(--accent); border-color: var(--accent); }
.perm-check.checked::after { content: '✓'; color: #000; font-size: 16px; font-weight: 900; }
.perm-label { font-size: 14px; font-weight: 700; color: var(--text); }
.perm-desc { font-size: 12px; color: var(--textMuted); margin-top: 2px; }

.privacy-box {
  border: 1px dashed #00FF7F;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 20px;
  width: 100%;
}
.privacy-txt { font-size: 12px; color: #00FF7F; font-weight: 600; line-height: 19px; text-align: center; }

/* Fuel settings */
.fuel-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
}
.fuel-option + .fuel-option { border-top: 1px solid var(--border); }
.fuel-option:hover { background: var(--surfaceAlt); }
.fuel-label { font-size: 16px; font-weight: 500; color: var(--text); }
.radio-circle {
  width: 24px; height: 24px; border-radius: 12px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
}
.radio-circle.selected { border-color: var(--accent); background: var(--accent); }
.radio-circle.selected::after { content: ''; width: 8px; height: 8px; border-radius: 4px; background: #fff; }
.fuel-field {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
}
.fuel-field + .fuel-field { border-top: 1px solid var(--border); }
.fuel-field-label { font-size: 15px; font-weight: 500; color: var(--text); }
.fuel-field-right { display: flex; align-items: center; gap: 8px; }
.fuel-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  min-width: 80px;
  text-align: right;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text);
}
.fuel-suffix { font-size: 12px; color: var(--textDim); min-width: 60px; }

/* Splash */
.splash-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: #0d0a08;
}
.splash-logo {
  width: 88px; height: 88px; border-radius: 22px;
  background: #E8B27A;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.splash-logo-txt { font-size: 52px; font-weight: 900; color: #000; }
.splash-brand { font-size: 34px; font-weight: 900; letter-spacing: 8px; color: #E8B27A; }
.splash-tagline { font-size: 14px; color: #a89580; margin-top: 8px; }

/* Sub-screen transition */
.screen-content { animation: fadeIn 0.2s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Founding badge */
.founding-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  background: linear-gradient(135deg, #FFD700, #FF8C00);
  font-size: 8px;
  font-weight: 900;
  color: #000;
  letter-spacing: 1px;
}

/* Bell */
.bell-icon {
  width: 36px; height: 36px; border-radius: 18px;
  border: 1px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 8px rgba(0,255,136,0.3);
}

/* Hidden screens */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="notch"><div class="notch-pill"></div></div>

  <div class="screen-area" id="screenArea">

  document.querySelectorAll('.tab-item').forEach(t => {

  switch(currentTab) {

    case 'plan': area.innerHTML = renderPlan(); break;

function renderSubScreen(sub) {
  switch(sub) {
    case 'overlay': return renderOverlay();
    case 'fuel': return renderFuel();

// ============ ONBOARDING ============
function renderOnboarding() {
  if (onboardingStep === 'splash') {
    return `<div class="splash-screen" style="height:100%">

      <div class="splash-brand">DRUMIQ</div>

      <div style="margin-top:40px">
        <div class="btn-accent" style="padding:12px 40px;font-size:13px" onclick="onboardingStep='welcome';render()">INTRA &#8594;</div>
      </div>
    </div>`;
  }

  const dotSteps = ['welcome','car','permissions','ready'];
  const dotIdx = dotSteps.indexOf(onboardingStep);
  const dots = dotIdx >= 0 ? `<div class="dots-row">
    ${dotSteps.map((_, i) => `<div class="dot ${i <= dotIdx ? 'active' : ''}"></div>`).join('')}
  </div>` : '';

  if (onboardingStep === 'welcome') {
    return `<div class="onboarding-center">
      ${dots}
      <div class="onboarding-title">Salut!</div>
      <div class="onboarding-title" style="color:var(--accent)">Hai sa configuram DRUMIQ</div>
      <div style="height:32px"></div>
      <div style="width:100%;margin-bottom:32px">
        <div class="bullet-row"><div class="bullet-circle" style="background:#00FF88">$</div><span class="bullet-text">GO = cursa profitabila</span></div>
        <div class="bullet-row"><div class="bullet-circle" style="background:#FFB800">?</div><span class="bullet-text">THINK = analizeaza</span></div>
        <div class="bullet-row"><div class="bullet-circle" style="background:#FF3366">X</div><span class="bullet-text">STOP = evita</span></div>
      </div>
      <div class="btn-accent" onclick="onboardingStep='car';render()">CONTINUA &#8594;</div>
    </div>`;
  }

  if (onboardingStep === 'car') {
    return `<div class="onboarding-center" style="justify-content:flex-start;padding-top:48px">
      ${dots}
      <div class="onboarding-title">Alege masina ta</div>
      <div class="onboarding-hint" style="margin-bottom:24px">Selecteaza marca, modelul si motorul</div>

      <div class="card" style="width:100%;margin-bottom:8px;cursor:pointer" onclick="onboardingStep='permissions';render()">
        <div style="font-size:14px;font-weight:700;color:var(--text)">Dacia</div>
        <div style="font-size:11px;color:var(--textMuted);margin-top:4px">Sandero, Logan, Duster, Spring...</div>
      </div>
      <div class="card" style="width:100%;margin-bottom:8px;cursor:pointer" onclick="onboardingStep='permissions';render()">
        <div style="font-size:14px;font-weight:700;color:var(--text)">Skoda</div>
        <div style="font-size:11px;color:var(--textMuted);margin-top:4px">Fabia, Octavia, Scala...</div>
      </div>
      <div class="card" style="width:100%;margin-bottom:8px;cursor:pointer" onclick="onboardingStep='permissions';render()">
        <div style="font-size:14px;font-weight:700;color:var(--text)">Toyota</div>
        <div style="font-size:11px;color:var(--textMuted);margin-top:4px">Corolla, Yaris, C-HR...</div>
      </div>
      <div class="card" style="width:100%;margin-bottom:8px;cursor:pointer" onclick="onboardingStep='permissions';render()">
        <div style="font-size:14px;font-weight:700;color:var(--text)">Volkswagen</div>
        <div style="font-size:11px;color:var(--textMuted);margin-top:4px">Polo, Golf, Passat, ID.3...</div>
      </div>

      <div style="margin-top:20px;cursor:pointer" onclick="onboardingStep='permissions';render()">
        <span style="font-size:13px;color:var(--textMuted);font-weight:500;letter-spacing:0.5px">Alta masina (setez manual) &#8594;</span>
      </div>
    </div>`;
  }

  if (onboardingStep === 'permissions') {
    return `<div class="onboarding-center">
      ${dots}
      <div class="onboarding-title">Permisiuni necesare</div>
      <div class="onboarding-hint" style="margin-bottom:24px">DRUMIQ are nevoie de aceste permisiuni ca sa functioneze corect</div>

      <div class="privacy-box">
        <div class="privacy-txt">Datele tale raman DOAR pe telefon.<br>Nu trimitem nimic pe internet.</div>
      </div>

      <div style="width:100%">
        <div class="perm-row" onclick="this.querySelector('.perm-check').classList.toggle('checked')">
          <div class="perm-check checked"></div>
          <div style="flex:1">
            <div class="perm-label">Accessibility</div>
            <div class="perm-desc">Citeste ofertele Bolt automat</div>
          </div>
        </div>
        <div class="perm-row" onclick="this.querySelector('.perm-check').classList.toggle('checked')">
          <div class="perm-check checked"></div>
          <div style="flex:1">
            <div class="perm-label">Overlay (afisare peste alte aplicatii)</div>
            <div class="perm-desc">Arata verdictul GO/THINK/STOP peste Bolt</div>
          </div>
        </div>
        <div class="perm-row" onclick="this.querySelector('.perm-check').classList.toggle('checked')">
          <div class="perm-check"></div>
          <div style="flex:1">
            <div class="perm-label">Baterie (fara optimizare)</div>
            <div class="perm-desc">Previne oprirea DRUMIQ in fundal</div>
          </div>
          <span style="color:var(--accent);font-size:13px;font-weight:700">ACORDA</span>

      <div class="btn-accent" onclick="onboardingStep='ready';render()">CONTINUA &#8594;</div>
    </div>`;
  }

  if (onboardingStep === 'ready') {
    return `<div class="onboarding-center">
      ${dots}
      <div style="font-size:48px;margin-bottom:16px">&#127881;</div>
      <div class="onboarding-title" style="color:var(--accent)">Gata!</div>
      <div style="height:16px"></div>
      <div style="border:1px solid rgba(0,255,136,0.25);border-radius:12px;padding:20px;width:100%;text-align:center;background:var(--surface)">
        <div style="font-size:18px;font-weight:700;color:var(--text)">Trial activ</div>
        <div style="font-size:22px;font-weight:900;color:var(--accent);margin-top:8px">100 curse · 7 zile</div>
      </div>
      <div class="btn-accent" onclick="onboardingStep='bolt';render()">CONTINUA &#8594;</div>
    </div>`;
  }

  if (onboardingStep === 'bolt') {
    return `<div class="onboarding-center">
      <div class="onboarding-title">Deschide Sofer partener</div>

      <div class="btn-accent" style="background:#34D058;margin-top:28px" onclick="currentSub=null;onboardingStep='splash';render()">
        <span style="color:#fff">DESCHIDE BOLT DRIVER</span>
      </div>
      <div style="margin-top:14px;cursor:pointer" onclick="currentSub=null;onboardingStep='splash';render()">
        <span style="font-size:13px;color:var(--textMuted);font-weight:500;letter-spacing:0.5px">Inchide configurarea &#8594;</span>
      </div>
    </div>`;
  }

  return '';
}
